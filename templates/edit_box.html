
{% extends 'base.html' %}
{% block title %}עריכת קופסא{% endblock %}

{% block content %}

<div class="card shadow p-4 form-card">

<h2 class="mb-4">עריכת קופסא</h2>

<form method="post" enctype="multipart/form-data">

<div class="mb-3">
<label class="form-label">שם הקופסא</label>
<input type="text" name="name" value="{{ box.name }}" class="form-control" required>
</div>

<h5>תמונה נוכחית</h5>

{% if box.photo and box.photo != 'none' %}
<img src="/static/images/{{ box.photo }}" class="img-fluid rounded mb-3 preview-image">
{% else %}
<p class="text-muted">אין תמונה</p>
{% endif %}

<label class="form-label">החלף תמונה</label>
<input type="file" name="photo" accept="image/*" capture="environment" class="form-control mb-3">

<div class="d-flex gap-2 flex-wrap">
<button class="btn btn-success">שמור שינויים</button>
<a href="{{ url_for('box', box_id=box.id) }}" class="btn btn-secondary">חזרה</a>
</div>

</form>

</div>

{% endblock %}
