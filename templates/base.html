
<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0d6efd">

<link rel="manifest" href="/static/pwa/manifest.json">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<title>{% block title %}ניהול קופסאות{% endblock %}</title>

<style>
body{background:#f5f6fa;}
.card-hover{transition: transform .15s, box-shadow .15s;}
.card-hover:hover{transform:translateY(-4px);box-shadow:0 10px 20px rgba(0,0,0,0.08);}
.preview-image{max-height:200px;object-fit:cover;}
.search-result-card{
display:flex;justify-content:space-between;align-items:center;
padding:10px;border-bottom:1px solid #eee;
}
</style>
</head>

<a href="#" id="fabButton" class="fab">+</a>

<script>
document.getElementById("fabButton").addEventListener("click", function(){

    const currentBox = document.body.dataset.box;

    if(currentBox){
        window.scrollTo({top:0, behavior:"smooth"});
        return;
    }

    window.location.href = "/?addItem=1";

});
</script>

<body class="app-shell">

<nav class="navbar navbar-expand-lg bg-white shadow-sm mb-4 sticky-top">
<div class="container">
<a class="navbar-brand fw-bold" href="{{ url_for('index') }}">📦 Boxes Manager</a>
<div class="d-flex gap-2">
<a href="{{ url_for('index') }}" class="btn btn-outline-primary btn-sm">כל הקופסאות</a>
<a href="{{ url_for('add_box_route') }}" class="btn btn-primary btn-sm">➕ קופסא</a>
</div>
</div>
</nav>

<main class="container pb-5">
{% block content %}{% endblock %}
</main>

{% block scripts %}{% endblock %}

</body>
</html>
